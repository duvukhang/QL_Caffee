<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<title>Đổi mật khẩu</title>
<main>
    <section class="page-banner">
        <h1>Đổi mật khẩu</h1>
        <p>Thiết lập mật khẩu mới để tăng cường bảo mật cho tài khoản của bạn.</p>
    </section>

    <section class="section">
        <form class="form" th:action="@{/user/change-password}" th:object="${changePasswordForm}" method="post" style="max-width:620px">
            <h2>Cập nhật mật khẩu</h2>
            <label>Mật khẩu hiện tại</label>
            <input type="password" th:field="*{oldPassword}">
            <div class="field-error" th:errors="*{oldPassword}"></div>

            <label>Mật khẩu mới</label>
            <input type="password" th:field="*{newPassword}">
            <div class="field-error" th:errors="*{newPassword}"></div>

            <label>Xác nhận mật khẩu mới</label>
            <input type="password" th:field="*{confirmPassword}">
            <div class="field-error" th:errors="*{confirmPassword}"></div>

            <div class="form-actions">
                <button class="btn" type="submit">Đổi mật khẩu</button>
                <a class="btn secondary" th:href="@{/user/profile}">Quay lại hồ sơ</a>
            </div>
        </form>
    </section>
</main>
</html>
