<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<title>Liên hệ</title>
<main class="contact-shell">
    <section class="page-banner">
        <h1>Hệ thống cửa hàng</h1>
        <p>Kết nối với Ban Caffee để được hỗ trợ đặt hàng, giải đáp thông tin sản phẩm và chăm sóc khách hàng nhanh chóng.</p>
    </section>

    <section class="info-grid" th:if="${!stores.isEmpty()}">
        <div class="mini-card" th:each="s : ${stores}">
            <div class="icon-bullet">📍</div>
            <h3 th:text="${s.storeName ?: s.storeId}">Tên cửa hàng</h3>
            <p th:text="${s.storeAddr ?: 'Địa chỉ đang cập nhật'}"></p>
            <p style="margin-top:8px"><strong>Hotline:</strong> <span th:text="${s.phoneNum ?: 'Đang cập nhật'}"></span></p>
        </div>
    </section>

    <div class="empty-state" th:if="${stores.isEmpty()}">
        <div class="empty-icon">☎️</div>
        <h3>Chưa có thông tin cửa hàng</h3>
        <p>Hiện tại dữ liệu địa chỉ cửa hàng đang được cập nhật.</p>
    </div>
</main>
</html>
