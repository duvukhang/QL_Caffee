<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập Hệ Thống</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-form { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; text-align: center; color: #1e3a8a; }
        .input-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #475569; }
        input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #1e3a8a; }
        .btn-login { width: 100%; padding: 12px; background: #1e3a8a; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 10px; transition: background 0.3s; }
        .btn-login:hover { background: #172554; }
        .btn-login:disabled { background: #94a3b8; cursor: not-allowed; }
        
        #error-msg { display: none; background-color: #fee2e2; color: #b91c1c; border-left: 4px solid #ef4444; padding: 10px; font-size: 13px; margin-bottom: 15px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-form">
        <h2>🔒 SIGN IN</h2>
        
        <div id="error-msg"></div>

        <div class="input-group">
            <label>Email Đăng Nhập</label>
            <input type="text" id="txtUser" value="admin@gmail.com" placeholder="Nhập email của bạn">
        </div>
        <div class="input-group">
            <label>Mật Khẩu</label>
            <input type="password" id="txtPass" value="123" placeholder="******">
        </div>
        <button class="btn-login" id="btn-login" onclick="executeLogin()">XÁC THỰC TÀI KHOẢN</button>
        <a href="index.html" style="display:block; text-align:center; margin-top:20px; color:#64748b; font-size:13px; text-decoration:none;">← Quay lại bảng điều khiển</a>
    </div>

    <script>
        async function executeLogin() {
            const user = document.getElementById("txtUser").value.trim();
            const pass = document.getElementById("txtPass").value.trim();
            const errorMsg = document.getElementById("error-msg");
            const btnLogin = document.getElementById("btn-login");

            if (!user || !pass) {
                showError("Vui lòng nhập đầy đủ Email và Mật khẩu!");
                return;
            }

            errorMsg.style.display = "none";
            btnLogin.innerText = "ĐANG XÁC THỰC...";
            btnLogin.disabled = true;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json().catch(() => ({}));

                if (!response.ok) {
                    throw new Error(data.message || "Tài khoản hoặc mật khẩu không chính xác!");
                }

                if (data.roles === "Customer" || data.accountType === "Customer") {
                    throw new Error("Tài khoản này là khách hàng. Vui lòng đăng nhập ở trang khách hàng.");
                }

                const jwtToken = data.token || data.accessToken || data.jwt;

                if (jwtToken) {
                    localStorage.setItem("token", jwtToken);
                    localStorage.setItem("role", data.roles || "");
                    localStorage.setItem("accountType", data.accountType || "");
                    localStorage.setItem("displayName", data.staffName || data.userName || "");
                    localStorage.removeItem("customerId");
                    window.location.href = data.redirectUrl || "/index.html";
                } else {
                    throw new Error("Cấu trúc trả về từ Server không hợp lệ!");
                }

            } catch (err) {
                showError(err.message || "Không thể kết nối đến Máy chủ");
            } finally {
                btnLogin.innerText = "XÁC THỰC TÀI KHOẢN";
                btnLogin.disabled = false;
            }
        }

        function showError(message) {
            const errorMsg = document.getElementById("error-msg");
            errorMsg.innerText = "⚠ " + message;
            errorMsg.style.display = "block";
        }

        document.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                executeLogin();
            }
        });
    </script>
</body>
</html>
