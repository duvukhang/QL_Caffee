<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - QL Caffee</title>
    <link rel="stylesheet" th:href="@{/css/shop.css}">
</head>
<body>
<div th:replace="~{shop/fragments :: topbar}"></div>
<div th:replace="~{shop/fragments :: flash}"></div>
<main class="container">
    <section class="panel auth">
        <p class="section-kicker">Tài khoản</p>
        <h1>Đăng ký</h1>
        <form th:action="@{/register}" method="post">
            <div class="form-row">
                <div>
                    <label>Username</label>
                    <input class="form-control" name="username" required minlength="3">
                </div>
                <div>
                    <label>Email</label>
                    <input class="form-control" type="email" name="email" required>
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Họ tên</label>
                    <input class="form-control" name="fullName" required>
                </div>
                <div>
                    <label>Số điện thoại</label>
                    <input class="form-control" name="phone" pattern="\d{10,11}">
                </div>
            </div>
            <div class="field">
                <label>Địa chỉ</label>
                <input class="form-control" name="address">
            </div>
            <div class="field">
                <label>Mật khẩu</label>
                <input class="form-control" type="password" name="password" required minlength="6">
            </div>
            <div class="actions">
                <button class="btn" type="submit">Đăng ký</button>
                <a class="btn secondary" th:href="@{/login}">Đăng nhập</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
