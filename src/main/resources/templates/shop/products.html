<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm - QL Caffee</title>
    <link rel="stylesheet" th:href="@{/css/shop.css}">
</head>
<body>
<div th:replace="~{shop/fragments :: topbar}"></div>
<div th:replace="~{shop/fragments :: flash}"></div>
<main class="container">
    <div class="section-title">
        <div>
            <p class="section-kicker">Menu</p>
            <h1>Sản phẩm</h1>
        </div>
    </div>
    <div class="filters">
        <form class="panel filter-panel" th:action="@{/products}" method="get" data-auto-submit="true">
            <div class="field">
                <label>Tìm kiếm</label>
                <input class="form-control" name="q" th:value="${q}" placeholder="Tên cà phê, trà, bánh...">
            </div>
            <div class="field">
                <label>Danh mục</label>
                <div class="clearable-select" data-submit-on-clear="true">
                    <select name="categoryId">
                        <option value="">Chọn danh mục</option>
                        <option th:each="category : ${categories}" th:value="${category.id}" th:selected="${category.id == categoryId}" th:text="${category.name}"></option>
                    </select>
                    <button type="button" class="clear-select-btn" aria-label="Xóa lựa chọn">×</button>
                </div>
            </div>
            <div class="field">
                <label>Thương hiệu</label>
                <div class="clearable-select" data-submit-on-clear="true">
                    <select name="brandId">
                        <option value="">Chọn thương hiệu</option>
                        <option th:each="brand : ${brands}" th:value="${brand.id}" th:selected="${brand.id == brandId}" th:text="${brand.name}"></option>
                    </select>
                    <button type="button" class="clear-select-btn" aria-label="Xóa lựa chọn">×</button>
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Giá từ</label>
                    <input class="form-control" type="number" name="minPrice" min="0" th:value="${minPrice}" placeholder="0">
                </div>
                <div>
                    <label>Đến</label>
                    <input class="form-control" type="number" name="maxPrice" min="0" th:value="${maxPrice}" placeholder="500000">
                </div>
            </div>
            <div class="field">
                <label>Sắp xếp</label>
                <div class="clearable-select" data-submit-on-clear="true">
                    <select name="sort">
                        <option value="">Sắp xếp sản phẩm</option>
                        <option value="newest" th:selected="${sort == 'newest'}">Mới nhất</option>
                        <option value="popular" th:selected="${sort == 'popular'}">Phổ biến</option>
                        <option value="priceAsc" th:selected="${sort == 'priceAsc'}">Giá tăng dần</option>
                        <option value="priceDesc" th:selected="${sort == 'priceDesc'}">Giá giảm dần</option>
                    </select>
                    <button type="button" class="clear-select-btn" aria-label="Xóa lựa chọn">×</button>
                </div>
            </div>
            <div class="actions">
                <button class="btn" type="submit">Lọc sản phẩm</button>
            </div>
        </form>

        <section>
            <div class="grid grid-3">
                <article class="card product-card" th:each="product : ${products.content}">
                    <img class="product-img" th:src="${product.mainImagePath}" th:alt="${product.name}">
                    <div class="card-body">
                        <div class="product-meta">
                            <span class="badge" th:if="${product.featured}">Nổi bật</span>
                            <span class="badge warn" th:if="${product.onSale}">Sale</span>
                            <span th:class="${product.quantity > 0 ? 'badge status-success' : 'badge status-danger'}"
                                  th:text="${product.quantity > 0 ? 'Còn hàng' : 'Hết hàng'}">Còn hàng</span>
                            <span class="badge warn"
                                  th:if="${reviewCountByProductId[product.id] != null and reviewCountByProductId[product.id] > 0}"
                                  th:text="${#numbers.formatDecimal(ratingByProductId[product.id],1,'COMMA',1,'POINT')} + ' ★'">4.5 ★</span>
                        </div>
                        <h3 class="product-name" th:text="${product.name}">Tên sản phẩm</h3>
                        <p class="muted product-desc" th:text="${product.category.name}">Danh mục</p>
                        <div class="price-row">
                            <span class="price" th:text="${#numbers.formatDecimal(product.effectivePrice,0,'COMMA',0,'POINT')} + ' đ'">0 đ</span>
                            <span class="old-price" th:if="${product.onSale}" th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')} + ' đ'">0 đ</span>
                        </div>
                        <p class="muted">Tồn kho: <span th:text="${product.quantity}">0</span></p>
                        <div class="actions">
                            <a class="btn secondary small" th:href="@{/products/{id}(id=${product.id})}">Chi tiết</a>
                            <button class="btn secondary small" type="button"
                                    th:attr="data-name=${product.name},data-price=${#numbers.formatDecimal(product.effectivePrice,0,'COMMA',0,'POINT')},data-img=${product.mainImagePath},data-desc=${product.description}"
                                    onclick="quickView(this)">Xem nhanh</button>
                            <form th:action="@{/cart/add}" method="post">
                                <input type="hidden" name="productId" th:value="${product.id}">
                                <button class="btn small" type="submit" th:disabled="${product.quantity <= 0}"
                                        th:text="${product.quantity > 0 ? 'Thêm' : 'Hết hàng'}">Thêm</button>
                            </form>
                        </div>
                    </div>
                </article>
            </div>
            <div class="panel" th:if="${products.content.isEmpty()}">
                <p class="muted">Chưa tìm thấy sản phẩm phù hợp.</p>
            </div>
            <div class="actions" th:if="${products.totalPages > 1}">
                <a class="btn secondary small" th:if="${products.hasPrevious()}" th:href="@{/products(page=${products.number - 1},q=${q},categoryId=${categoryId},brandId=${brandId},minPrice=${minPrice},maxPrice=${maxPrice},sort=${sort})}">Trước</a>
                <span class="badge" th:text="|Trang ${products.number + 1}/${products.totalPages}|">Trang 1/1</span>
                <a class="btn secondary small" th:if="${products.hasNext()}" th:href="@{/products(page=${products.number + 1},q=${q},categoryId=${categoryId},brandId=${brandId},minPrice=${minPrice},maxPrice=${maxPrice},sort=${sort})}">Sau</a>
            </div>
        </section>
    </div>
</main>
<dialog id="quickViewDialog">
    <div class="modal-content">
        <img id="quickImg" class="product-img" src="/img/no-image.png" alt="">
        <h2 id="quickName"></h2>
        <p class="price"><span id="quickPrice"></span> đ</p>
        <p class="muted" id="quickDesc"></p>
        <button class="btn secondary" type="button" onclick="document.getElementById('quickViewDialog').close()">Đóng</button>
    </div>
</dialog>
</body>
</html>
