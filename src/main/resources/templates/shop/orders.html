<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn hàng - QL Caffee</title>
    <link rel="stylesheet" th:href="@{/css/shop.css}">
</head>
<body>
<div th:replace="~{shop/fragments :: topbar}"></div>
<div th:replace="~{shop/fragments :: flash}"></div>
<main class="container">
    <div class="section-title">
        <div>
            <p class="section-kicker">Tài khoản</p>
            <h1>Lịch sử đơn hàng</h1>
        </div>
    </div>
    <div class="table-wrap">
        <table class="table">
            <thead><tr><th>Mã đơn</th><th>Ngày</th><th>Trạng thái</th><th>Tổng</th><th></th></tr></thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td><strong th:text="${order.orderCode}">DH</strong></td>
                <td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">Ngày</td>
                <td><span th:class="${'badge ' + @shopLabels.orderBadgeClass(order.status)}" th:text="${@shopLabels.label(order.status)}">Chờ xác nhận</span></td>
                <td th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + ' đ'">0 đ</td>
                <td><a class="btn secondary small" th:href="@{/orders/{id}(id=${order.id})}">Chi tiết</a></td>
            </tr>
            <tr th:if="${orders.isEmpty()}">
                <td colspan="5" class="muted">Bạn chưa có đơn hàng nào.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
