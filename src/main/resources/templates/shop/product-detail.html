<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - QL Caffee'">Chi tiết</title>
    <link rel="stylesheet" th:href="@{/css/shop.css}">
</head>
<body>
<div th:replace="~{shop/fragments :: topbar}"></div>
<div th:replace="~{shop/fragments :: flash}"></div>
<main class="container">
    <section class="detail">
        <div class="thumbs">
            <img th:each="image : ${product.images}" th:src="${image.imagePath}" th:alt="${product.name}">
            <img th:if="${product.images.isEmpty()}" th:src="@{/img/no-image.png}" alt="Không có ảnh">
        </div>
        <div class="panel">
            <div class="product-meta">
                <span class="badge" th:text="${product.category.name}">Danh mục</span>
                <span class="badge warn" th:if="${product.onSale}">Sale</span>
                <span th:class="${product.quantity > 0 ? 'badge status-success' : 'badge status-danger'}"
                      th:text="${product.quantity > 0 ? 'Còn hàng' : 'Hết hàng'}">Còn hàng</span>
                <span class="badge warn" th:if="${reviewCount > 0}"
                      th:text="${#numbers.formatDecimal(averageRating,1,'COMMA',1,'POINT')} + ' ★'">4.5 ★</span>
                <span class="badge" th:text="${reviewCount} + ' đánh giá'">0 đánh giá</span>
            </div>
            <h1 th:text="${product.name}">Tên sản phẩm</h1>
            <div class="price-row">
                <span class="price" th:text="${#numbers.formatDecimal(product.effectivePrice,0,'COMMA',0,'POINT')} + ' đ'">0 đ</span>
                <span class="old-price" th:if="${product.onSale}" th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')} + ' đ'">0 đ</span>
            </div>
            <p class="muted" th:text="${product.description}">Mô tả</p>
            <p><strong>Tồn kho:</strong> <span th:text="${product.quantity}">0</span></p>
            <form th:action="@{/cart/add}" method="post" class="actions">
                <input type="hidden" name="productId" th:value="${product.id}">
                <input class="form-control qty-input" type="number" name="quantity" value="1" min="1" th:max="${product.quantity}">
                <button class="btn" type="submit" th:disabled="${product.quantity <= 0}"
                        th:text="${product.quantity > 0 ? 'Thêm vào giỏ' : 'Hết hàng'}">Thêm vào giỏ</button>
            </form>
        </div>
    </section>

    <section>
        <div class="section-title">
            <div>
                <p class="section-kicker">Review</p>
                <h2>Đánh giá sản phẩm</h2>
            </div>
            <span class="badge warn" th:if="${reviewCount > 0}"
                  th:text="${#numbers.formatDecimal(averageRating,1,'COMMA',1,'POINT')} + ' ★ trung bình'">4.5 ★ trung bình</span>
        </div>
        <div class="panel" th:if="${reviewCount == 0}">
            <p class="muted">Sản phẩm chưa có đánh giá đã duyệt.</p>
        </div>
        <div class="grid grid-3" th:if="${reviewCount > 0}">
            <article class="card card-body" th:each="review : ${reviews}">
                <span class="badge status-success" th:text="${review.rating} + ' sao'">5 sao</span>
                <p th:text="${review.comment}">Bình luận</p>
                <p class="muted" th:text="${review.user.fullName}">Khách hàng</p>
            </article>
        </div>
    </section>
</main>
</body>
</html>
