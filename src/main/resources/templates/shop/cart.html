<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - QL Caffee</title>
    <link rel="stylesheet" th:href="@{/css/shop.css}">
</head>
<body>
<div th:replace="~{shop/fragments :: topbar}"></div>
<div th:replace="~{shop/fragments :: flash}"></div>
<main class="container">
    <div class="section-title">
        <div>
            <p class="section-kicker">Giỏ hàng</p>
            <h1>Món bạn đã chọn</h1>
        </div>
        <a class="btn secondary small" th:href="@{/products}">Mua thêm</a>
    </div>
    <div class="cart-shell">
        <section class="cart-list">
            <article class="card cart-item" th:each="item : ${cart.items}">
                <img th:src="${item.product.mainImagePath}" th:alt="${item.product.name}">
                <div>
                    <strong th:text="${item.product.name}">Tên sản phẩm</strong>
                    <p class="muted">Tồn kho: <span th:text="${item.product.quantity}">0</span></p>
                    <span th:class="${item.product.quantity > 0 ? 'badge status-success' : 'badge status-danger'}"
                          th:text="${item.product.quantity > 0 ? 'Còn hàng' : 'Hết hàng'}">Còn hàng</span>
                </div>
                <div>
                    <span class="muted">Đơn giá</span>
                    <div class="price" th:text="${#numbers.formatDecimal(item.product.effectivePrice,0,'COMMA',0,'POINT')} + ' đ'">0 đ</div>
                </div>
                <div>
                    <span class="muted">Số lượng</span>
                    <form th:action="@{/cart/items/{id}/update(id=${item.id})}" method="post" class="qty-form">
                        <input class="form-control qty-input" type="number" name="quantity" min="0" th:max="${item.product.quantity}" th:value="${item.quantity}">
                        <button class="btn secondary small" type="submit">Lưu</button>
                    </form>
                </div>
                <div>
                    <span class="muted">Tổng</span>
                    <div class="price" th:text="${#numbers.formatDecimal(item.lineTotal,0,'COMMA',0,'POINT')} + ' đ'">0 đ</div>
                    <form th:action="@{/cart/items/{id}/remove(id=${item.id})}" method="post" class="actions">
                        <button class="btn danger small" type="submit">Xóa</button>
                    </form>
                </div>
            </article>
            <div class="panel" th:if="${cart.items.isEmpty()}">
                <p class="muted">Giỏ hàng đang trống.</p>
                <a class="btn" th:href="@{/products}">Xem sản phẩm</a>
            </div>
        </section>
        <aside class="panel summary">
            <h2>Tổng đơn</h2>
            <div class="summary-row">
                <span>Tạm tính</span>
                <strong th:text="${#numbers.formatDecimal(subtotal,0,'COMMA',0,'POINT')} + ' đ'">0 đ</strong>
            </div>
            <div class="summary-row">
                <span>Phí vận chuyển</span>
                <strong>0 đ</strong>
            </div>
            <form th:action="@{/cart/apply-coupon}" method="post" class="coupon-input">
                <input class="form-control" name="couponCode" placeholder="Nhập mã khuyến mãi" th:value="${couponCode}">
                <button class="btn secondary" type="submit">Áp mã</button>
            </form>
            <form th:if="${couponCode != null}" th:action="@{/cart/clear-coupon}" method="post" class="actions">
                <button class="btn secondary small" type="submit">Bỏ mã</button>
            </form>
            <p th:if="${couponQuote != null and !couponQuote.message.isBlank()}"
               th:class="${couponQuote.valid ? 'badge status-success' : 'badge status-danger'}"
               th:text="${couponQuote.message}">Thông báo</p>
            <div class="summary-row">
                <span>Giảm giá</span>
                <strong th:text="${#numbers.formatDecimal(couponQuote.discountAmount,0,'COMMA',0,'POINT')} + ' đ'">0 đ</strong>
            </div>
            <div class="summary-row total">
                <span>Thành tiền</span>
                <strong th:text="${#numbers.formatDecimal(couponQuote.totalAmount,0,'COMMA',0,'POINT')} + ' đ'">0 đ</strong>
            </div>
            <div class="actions">
                <a class="btn full" th:href="@{/checkout}" th:if="${!cart.items.isEmpty()}">Thanh toán</a>
            </div>
        </aside>
    </div>
</main>
</body>
</html>
