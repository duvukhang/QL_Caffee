<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm admin</title>
    <link rel="stylesheet" th:href="@{/css/shop.css}">
</head>
<body>
<div th:replace="~{shop/fragments :: topbar}"></div>
<div th:replace="~{shop/fragments :: flash}"></div>
<main class="container admin-shell">
    <div th:replace="~{shop/fragments :: adminNav}"></div>
    <section>
        <div class="section-title">
            <div>
                <p class="section-kicker">Quản lý</p>
                <h1>Sản phẩm</h1>
            </div>
            <a class="btn" th:href="@{/admin/products/new}">Thêm sản phẩm</a>
        </div>
        <div class="admin-tools">
            <input class="form-control" data-table-search="#productsTable" placeholder="Tìm sản phẩm, danh mục, trạng thái">
        </div>
        <div class="table-wrap">
            <table class="table" id="productsTable">
                <thead><tr><th>Ảnh</th><th>Tên</th><th>Giá</th><th>Tồn</th><th>Trạng thái</th><th></th></tr></thead>
                <tbody>
                <tr th:each="product : ${products}">
                    <td><img class="admin-thumb" th:src="${product.mainImagePath}" th:alt="${product.name}"></td>
                    <td><strong th:text="${product.name}">Tên</strong><p class="muted" th:text="${product.category.name}">Danh mục</p></td>
                    <td th:text="${#numbers.formatDecimal(product.effectivePrice,0,'COMMA',0,'POINT')} + ' đ'">0 đ</td>
                    <td><span th:class="${product.quantity < 5 ? 'badge danger' : 'badge status-success'}" th:text="${product.quantity}">0</span></td>
                    <td>
                        <span th:class="${'badge ' + @shopLabels.activeBadgeClass(product.active)}"
                              th:text="${@shopLabels.activeLabel(product.active)}">Đang hoạt động</span>
                    </td>
                    <td>
                        <div class="inline-form">
                            <a class="btn secondary small" th:href="@{/admin/products/{id}/edit(id=${product.id})}">Sửa</a>
                            <form th:action="@{/admin/products/{id}/delete(id=${product.id})}" method="post"
                                  data-confirm="Bạn có chắc muốn tắt sản phẩm này?">
                                <button class="btn danger small" type="submit">Tắt</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
