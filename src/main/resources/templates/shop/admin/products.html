<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm admin</title>
    <link rel="stylesheet" th:href="@{/css/shop.css}">
</head>
<body>
<div th:replace="~{shop/fragments :: topbar}"></div>
<div th:replace="~{shop/fragments :: flash}"></div>
<main class="container admin-shell">
    <div th:replace="~{shop/fragments :: adminNav}"></div>
    <section>
        <div class="section-title"><h1>Sản phẩm</h1><a class="btn" th:href="@{/admin/products/new}">Thêm</a></div>
        <table class="table">
            <thead><tr><th>Ảnh</th><th>Tên</th><th>Giá</th><th>Tồn</th><th>Trạng thái</th><th></th></tr></thead>
            <tbody>
            <tr th:each="product : ${products}">
                <td><img th:src="${product.mainImagePath}" th:alt="${product.name}" style="width:80px;height:60px;object-fit:cover;border-radius:6px"></td>
                <td><strong th:text="${product.name}">Tên</strong><p class="muted" th:text="${product.category.name}">DM</p></td>
                <td th:text="${#numbers.formatDecimal(product.effectivePrice,0,'COMMA',0,'POINT')} + ' đ'">0 đ</td>
                <td><span th:class="${product.quantity < 5} ? 'badge danger' : 'badge'" th:text="${product.quantity}">0</span></td>
                <td th:text="${product.active} ? 'Active' : 'Inactive'">Active</td>
                <td class="actions">
                    <a class="btn secondary small" th:href="@{/admin/products/{id}/edit(id=${product.id})}">Sửa</a>
                    <form th:action="@{/admin/products/{id}/delete(id=${product.id})}" method="post"><button class="btn danger small" type="submit">Tắt</button></form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
