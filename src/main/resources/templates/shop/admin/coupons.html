<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mã khuyến mãi</title>
    <link rel="stylesheet" th:href="@{/css/shop.css}">
</head>
<body>
<div th:replace="~{shop/fragments :: topbar}"></div>
<div th:replace="~{shop/fragments :: flash}"></div>
<main class="container admin-shell">
    <div th:replace="~{shop/fragments :: adminNav}"></div>
    <section>
        <div class="section-title">
            <div>
                <p class="section-kicker">Quản lý</p>
                <h1>Mã khuyến mãi</h1>
            </div>
        </div>
        <form class="panel" th:action="@{/admin/coupons}" method="post">
            <div class="form-row">
                <div><label>Mã coupon</label><input class="form-control" name="code" required placeholder="SALE10"></div>
                <div>
                    <label>Loại giảm giá</label>
                    <div class="clearable-select">
                        <select name="discountType" required data-enum-select>
                            <option value="">Chọn loại giảm giá</option>
                            <option th:each="type : ${discountTypes}" th:value="${type}" th:text="${@shopLabels.label(type)}"></option>
                        </select>
                        <button type="button" class="clear-select-btn" aria-label="Xóa lựa chọn">×</button>
                    </div>
                </div>
            </div>
            <div class="form-row">
                <div><label>Giá trị</label><input class="form-control" type="number" name="discountValue" min="1" required></div>
                <div><label>Đơn tối thiểu</label><input class="form-control" type="number" name="minOrderAmount" min="0" value="0" required></div>
            </div>
            <div class="form-row">
                <div><label>Giảm tối đa</label><input class="form-control" type="number" name="maxDiscountAmount" min="0"></div>
                <div><label>Lượt dùng</label><input class="form-control" type="number" name="usageLimit" min="1"></div>
            </div>
            <div class="form-row">
                <div><label>Bắt đầu</label><input class="form-control" type="datetime-local" name="startDate" required></div>
                <div><label>Kết thúc</label><input class="form-control" type="datetime-local" name="endDate" required></div>
            </div>
            <div class="actions">
                <label class="check-row"><input type="checkbox" name="active" checked> Đang hoạt động</label>
                <label class="check-row"><input type="checkbox" name="publicCoupon" checked> Công khai</label>
                <button class="btn" type="submit">Tạo coupon</button>
            </div>
        </form>
        <div class="admin-tools mt-16">
            <input class="form-control" data-table-search="#couponsTable" placeholder="Tìm mã, loại, trạng thái">
        </div>
        <div class="table-wrap">
            <table class="table" id="couponsTable">
                <thead><tr><th>Mã</th><th>Giảm</th><th>Điều kiện</th><th>Lượt</th><th>Trạng thái</th><th>Gán khách</th></tr></thead>
                <tbody>
                <tr th:each="coupon : ${coupons}">
                    <td>
                        <strong th:text="${coupon.code}">SALE10</strong>
                        <p class="muted" th:text="${@shopLabels.couponScopeLabel(coupon.publicCoupon)}">Công khai</p>
                    </td>
                    <td th:text="${coupon.discountType.name() == 'PERCENT' ? #numbers.formatDecimal(coupon.discountValue,0,'COMMA',0,'POINT') + '%' : #numbers.formatDecimal(coupon.discountValue,0,'COMMA',0,'POINT') + ' đ'}">10%</td>
                    <td th:text="${#numbers.formatDecimal(coupon.minOrderAmount,0,'COMMA',0,'POINT')} + ' đ'">0 đ</td>
                    <td th:text="|${coupon.usedCount}/${coupon.usageLimit == null ? 'Không giới hạn' : coupon.usageLimit}|">0</td>
                    <td>
                        <form th:action="@{/admin/coupons/{id}/toggle(id=${coupon.id})}" method="post">
                            <button th:class="${'btn secondary small ' + (coupon.active ? '' : 'disabled')}" type="submit"
                                    th:text="${@shopLabels.activeLabel(coupon.active)}">Đang hoạt động</button>
                        </form>
                    </td>
                    <td>
                        <form th:action="@{/admin/coupons/{id}/assign(id=${coupon.id})}" method="post" class="inline-form">
                            <div class="clearable-select">
                                <select name="userId" required>
                                    <option value="">Chọn khách hàng</option>
                                    <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.username}"></option>
                                </select>
                                <button type="button" class="clear-select-btn" aria-label="Xóa lựa chọn">×</button>
                            </div>
                            <button class="btn small" type="submit">Gán</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
