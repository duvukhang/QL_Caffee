<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khách hàng</title>
    <link rel="stylesheet" th:href="@{/css/shop.css}">
</head>
<body>
<div th:replace="~{shop/fragments :: topbar}"></div>
<div th:replace="~{shop/fragments :: flash}"></div>
<main class="container admin-shell">
    <div th:replace="~{shop/fragments :: adminNav}"></div>
    <section>
        <div class="section-title">
            <div>
                <p class="section-kicker">Quản lý</p>
                <h1>Khách hàng</h1>
            </div>
        </div>
        <div class="admin-tools">
            <input class="form-control" data-table-search="#usersTable" placeholder="Tìm username, email, số điện thoại">
        </div>
        <div class="table-wrap">
            <table class="table" id="usersTable">
                <thead><tr><th>Username</th><th>Email</th><th>Số điện thoại</th><th>Địa chỉ</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td><strong th:text="${user.username}">user</strong><p class="muted" th:text="${user.fullName}"></p></td>
                    <td class="cell-text" th:text="${user.email}">email</td>
                    <td th:text="${user.phone == null or user.phone.isBlank() ? 'Chưa có' : user.phone}">phone</td>
                    <td class="cell-text" th:text="${user.address == null or user.address.isBlank() ? 'Chưa có' : user.address}">address</td>
                    <td>
                        <span th:class="${user.enabled ? 'badge status-success' : 'badge status-danger'}"
                              th:text="${@shopLabels.enabledLabel(user.enabled)}">Đang hoạt động</span>
                    </td>
                    <td>
                        <form th:action="@{/admin/users/{id}/toggle(id=${user.id})}" method="post"
                              data-confirm="Bạn có chắc muốn đổi trạng thái người dùng này?">
                            <button class="btn danger small" type="submit" th:text="${user.enabled ? 'Khóa' : 'Mở khóa'}">Khóa</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
