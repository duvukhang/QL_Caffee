<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán online - QL Caffee</title>
    <link rel="stylesheet" th:href="@{/css/shop.css}">
</head>
<body>
<div th:replace="~{shop/fragments :: topbar}"></div>
<div th:replace="~{shop/fragments :: flash}"></div>
<main class="container">
    <div class="section-title">
        <div>
            <p class="section-kicker">Thanh toán</p>
            <h1>Thanh toán online</h1>
        </div>
        <span th:class="${'badge ' + @shopLabels.orderBadgeClass(order.paymentStatus)}"
              th:text="${@shopLabels.label(order.paymentStatus)}">Chờ xác nhận</span>
    </div>
    <div class="two-column">
        <section class="panel">
            <h2 th:text="${order.paymentMethod == T(com.example.Admin.Shop.Model.PaymentMethod).CARD ? 'Thanh toán thẻ mô phỏng' : 'Ví điện tử mô phỏng'}">Thanh toán online</h2>
            <p>Mã đơn: <strong th:text="${order.orderCode}">DH</strong></p>
            <p>Mã giao dịch: <strong th:text="${order.paymentReference}">PAY</strong></p>
            <p>Số tiền: <strong class="price" th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + ' đ'">0 đ</strong></p>
            <div class="qr-demo">
                <div class="qr-pattern"></div>
                <p class="muted">QR demo, không kết nối cổng thật.</p>
            </div>
            <form th:action="@{/payments/{id}/confirm(id=${order.id})}" method="post" class="actions">
                <button class="btn" type="submit">Mô phỏng thanh toán thành công</button>
            </form>
            <form th:action="@{/payments/{id}/fail(id=${order.id})}" method="post" class="actions">
                <button class="btn danger" type="submit">Mô phỏng thất bại và hủy đơn</button>
            </form>
        </section>
        <aside class="panel summary">
            <h2>Thông tin đơn</h2>
            <p><strong>Người nhận:</strong> <span th:text="${order.receiverName}"></span></p>
            <p><strong>Số điện thoại:</strong> <span th:text="${order.receiverPhone}"></span></p>
            <p><strong>Địa chỉ:</strong> <span th:text="${order.shippingAddress}"></span></p>
            <p>
                <strong>Trạng thái đơn:</strong>
                <span th:class="${'badge ' + @shopLabels.orderBadgeClass(order.status)}"
                      th:text="${@shopLabels.label(order.status)}"></span>
            </p>
            <p class="muted">Sau khi xác nhận thành công, admin mới có thể chuyển đơn sang trạng thái xử lý.</p>
        </aside>
    </div>
</main>
</body>
</html>
