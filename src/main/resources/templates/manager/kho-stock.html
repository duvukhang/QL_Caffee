<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Phiếu Kho - TVP Matrix</title>
    <style>
        :root { --primary: #059669; --bg: #f1f5f9; --surface: #ffffff; --text: #334155; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .card { max-width: 800px; margin: 0 auto; background: var(--surface); padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; display: flex; flex-direction: column; }
        label { font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #64748b; }
        select, input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-add { background: #3b82f6; color: white; }
        .btn-submit { background: var(--primary); color: white; width: 100%; margin-top: 20px; font-size: 16px; }
        .item-list { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-top: 15px; }
        .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #e2e8f0; }
        .btn-del { color: #ef4444; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h3>📝 TẠO PHIẾU ĐIỀU TIẾT XUẤT NHẬP KHO (TVP)</h3>
        
        <div class="form-row">
            <div class="form-group">
                <label>Mã Kho Hướng Đích (Inventory ID)</label>
                <input type="number" id="txtInventoryId" value="1">
            </div>
            <div class="form-group">
                <label>Hình Thức Giao Dịch (Type ID)</label>
                <select id="ddlTypeId">
                    <option value="1">Nhập Hàng Hóa Từ Nhà Cung Cấp (Type 1)</option>
                    <option value="2">Xuất Kho Nội Bộ / Hủy Hàng (Type 2)</option>
                </select>
            </div>
        </div>

        <fieldset style="border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px;">
            <legend style="font-weight: bold; color: #3b82f6; padding: 0 5px;">Thêm Hàng Hóa Bản Ghi</legend>
            <div class="form-row">
                <div class="form-group" style="flex: 2;">
                    <label>Chọn Sản Phẩm / Nguyên Liệu</label>
                    <select id="ddlGood">
                        <option value="" disabled selected>Đang tải danh sách nguyên liệu...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Số Lượng Thao Tác</label>
                    <input type="number" id="txtSoluong" value="10" min="1">
                </div>
                <div class="form-group" style="justify-content: flex-end;">
                    <button type="button" class="btn btn-add" onclick="addItemToList()">+ Chèn Dòng</button>
                </div>
            </div>
        </fieldset>

        <div class="item-list">
            <h4 style="margin: 0 0 10px 0; color: #475569;">Danh Sách Chờ Đẩy Xuống Stored Procedure:</h4>
            <div id="queue-container">
                <div style="text-align: center; color: #94a3b8; font-size: 13px;">Chưa có mặt hàng nào được chọn.</div>
            </div>
        </div>

        <button class="btn btn-submit" onclick="submitTVPToDatabase()">🚀 XÁC NHẬN PHÊ DUYỆT PHIẾU KHO</button>
        <a href="kho-detail.html" style="display:block; text-align:center; margin-top:15px; color:#64748b; font-size:14px;">Quay lại trang tồn kho</a>
    </div>

    <script>
        // Mảng chứa danh sách hàng hóa đẩy xuống mảng TVP SQL
        let productItemsQueue = [];
        let goodOptions = [];

        async function loadGoodOptions() {
            const select = document.getElementById("ddlGood");
            try {
                const res = await fetch('/public/NL');
                if (!res.ok) throw new Error('Không tải được danh sách nguyên liệu');
                const goods = await res.json();
                goodOptions = Array.isArray(goods) ? goods : [];

                if (goodOptions.length === 0) {
                    select.innerHTML = '<option value="" disabled selected>Không có nguyên liệu nào.</option>';
                    return;
                }
                select.innerHTML = '<option value="" disabled selected>Chọn nguyên liệu / sản phẩm...</option>';
                goodOptions.forEach(good => {
                    const id = good.goodId || good.GoodId || good.id || '';
                    const name = good.goodName || good.GoodName || good.name || good.Name || 'Chưa rõ tên';
                    const option = document.createElement('option');
                    option.value = id;
                    option.textContent = `${name} (${id})`;
                    select.appendChild(option);
                });
            } catch (error) {
                select.innerHTML = `<option value="" disabled selected>Lỗi tải nguyên liệu: ${error.message}</option>`;
            }
        }

        function addItemToList() {
            const ddl = document.getElementById("ddlGood");
            const masp = ddl.value.trim();
            const selectedText = ddl.options[ddl.selectedIndex]?.text || '';
            const soLuong = parseInt(document.getElementById("txtSoluong").value);

            if(!masp) { alert("Vui lòng chọn sản phẩm hoặc nguyên liệu!"); return; }
            if(soLuong <= 0) { alert("Số lượng phải lớn hơn 0!"); return; }

            productItemsQueue.push({ masp: masp, soLuong: soLuong, displayName: selectedText });
            renderQueue();

            ddl.selectedIndex = 0;
            document.getElementById("txtSoluong").value = 10;
            ddl.focus();
        }

        function removeItem(index) {
            productItemsQueue.splice(index, 1);
            renderQueue();
        }

        function renderQueue() {
            const container = document.getElementById("queue-container");
            if(productItemsQueue.length === 0) {
                container.innerHTML = `<div style="text-align: center; color: #94a3b8; font-size: 13px;">Chưa có mặt hàng nào được chọn.</div>`;
                return;
            }
            container.innerHTML = "";
            productItemsQueue.forEach((item, index) => {
                const label = item.displayName ? `${item.displayName}` : `<b>${item.masp}</b>`;
                container.innerHTML += `
                    <div class="item-row">
                        <span>📦 ${label} — Số lượng: <span style="color:#0284c7;font-weight:bold;">${item.soLuong}</span></span>
                        <span class="btn-del" onclick="removeItem(${index})">Xóa</span>
                    </div>
                `;
            });
        }

        function submitTVPToDatabase() {
            if(productItemsQueue.length === 0) { alert("Danh sách trống! Hãy chèn ít nhất một mặt hàng."); return; }

            const invId = document.getElementById("txtInventoryId").value;
            const typeId = document.getElementById("ddlTypeId").value;

            // Gọi API dạng POST trùng khớp endpoint đã fix
            fetch(`/manager/kho/Stock/${invId}/${typeId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': localStorage.getItem('token') || 'Bearer test-token'
                },
                body: JSON.stringify(productItemsQueue)
            })
            .then(res => {
                if(!res.ok) return res.json().then(err => { throw new Error(err.message || "Lỗi DB") });
                return res.json();
            })
            .then(data => {
                alert(`Tạo phiếu thành công!\nMã Phiếu Hệ Thống: ${data.RecordId}\nNgày nhập: ${data.AdmissionDate}`);
                productItemsQueue = [];
                renderQueue();
            })
            .catch(err => {
                alert("Thất bại: " + err.message);
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadGoodOptions();
        });
    </script>
</body>
</html>
