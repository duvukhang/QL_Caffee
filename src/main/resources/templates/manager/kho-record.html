<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Sử Phiếu Kho - Phân Trang</title>
    <style>
        :root { --primary: #4b5563; --bg: #f8fafc; --surface: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .box { max-width: 1000px; margin: 0 auto; background: var(--surface); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #1f2937; border-left: 5px solid var(--primary); padding-left: 10px; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; color: #475569; }
        .pagination { display: flex; justify-content: center; gap: 5px; margin-top: 15px; }
        .page-btn { padding: 8px 12px; border: 1px solid #cbd5e1; background: white; border-radius: 4px; cursor: pointer; }
        .page-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .page-btn:disabled { background: #f1f5f9; color: #94a3b8; cursor: not-allowed; }
        .link-detail { color: #2563eb; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="box">
        <h2>📜 LỊCH SỬ PHIẾU XUẤT NHẬP KHO TỔNG HỢP</h2>
        <a href="kho-detail.html" style="font-size: 14px; color: #3b82f6;">← Quay lại bảng tổng quan kho</a>

        <table>
            <thead>
                <tr>
                    <th>Mã Phiếu</th>
                    <th>Ngày Lập Phiếu</th>
                    <th>Mã Hình Thức</th>
                    <th>Tên Loại Hình Thức</th>
                    <th>Hành Động</th>
                </tr>
            </thead>
            <tbody id="record-tbody">
                <tr><td colspan="5" style="text-align: center; color: #94a3b8;">Đang tải dữ liệu lịch sử...</td></tr>
            </tbody>
        </table>

        <div class="pagination" id="pagination-controls"></div>
    </div>

    <script>
        let currentPage = 1;
        const pageSize = 5; // Khống chế hiển thị 5 bản ghi mỗi trang để test phân trang

        function loadRecords(page) {
            currentPage = page;
            fetch(`/manager/kho/Record?PageNum=${page}&PageSize=${pageSize}`, {
                method: 'GET',
                headers: { 'Authorization': localStorage.getItem('token') || 'Bearer test-token' }
            })
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById("record-tbody");
                tbody.innerHTML = "";

                if(!data.items || data.items.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;">Không có lịch sử phiếu nào.</td></tr>`;
                    return;
                }

                // Giải nén cấu trúc phẳng flatItem chứa {Value, PathChiTiet}
                data.items.forEach(item => {
                    const rowData = item.Value;
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td><span style="font-family:monospace; font-weight:bold;">${rowData.RecordId}</span></td>
                        <td>${new Date(rowData.AdmissionDate).toLocaleString('vi-VN')}</td>
                        <td><span style="color:#64748b;">Type: ${rowData.TypeId || '0'}</span></td>
                        <td><b>${rowData.TypeName || 'Mặc định'}</b></td>
                        <td><a href="/manager/kho/${item.PathChiTiet}" class="link-detail">🔍 Xem Chi Tiết</a></td>
                    `;
                    tbody.appendChild(tr);
                });

                renderPagination(data.totalPages, data.pageIndex);
            })
            .catch(err => {
                document.getElementById("record-tbody").innerHTML = `<tr><td colspan="5" style="text-align:center; color:red;">Lỗi nạp dữ liệu phân trang!</td></tr>`;
            });
        }

        function renderPagination(totalPages, pageIndex) {
            const container = document.getElementById("pagination-controls");
            container.innerHTML = "";

            // Nút Quay Lại (Prev)
            const prevBtn = document.createElement("button");
            prevBtn.className = "page-btn";
            prevBtn.innerText = "«";
            prevBtn.disabled = (pageIndex === 1);
            prevBtn.onclick = () => loadRecords(pageIndex - 1);
            container.appendChild(prevBtn);

            // Sinh các số trang
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement("button");
                btn.className = `page-btn ${i === pageIndex ? 'active' : ''}`;
                btn.innerText = i;
                btn.onclick = () => loadRecords(i);
                container.appendChild(btn);
            }

            // Nút Tiếp Theo (Next)
            const nextBtn = document.createElement("button");
            nextBtn.className = "page-btn";
            nextBtn.innerText = "»";
            nextBtn.disabled = (pageIndex === totalPages || totalPages === 0);
            nextBtn.onclick = () => loadRecords(pageIndex + 1);
            container.appendChild(nextBtn);
        }

        // Khởi động load trang đầu tiên khi vừa vào ứng dụng
        document.addEventListener("DOMContentLoaded", () => {
            loadRecords(1);
        });
    </script>
</body>
</html>
