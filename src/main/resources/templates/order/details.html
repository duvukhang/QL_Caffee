<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<title>Chi tiết đơn hàng</title>
<main>
    <section class="page-banner">
        <h1>Đơn hàng <span th:text="${order.orderId}"></span></h1>
        <p>Trạng thái hiện tại: <strong th:text="${order.displayStatus}"></strong>. Luồng xử lý: Chờ xác nhận → Đã xác nhận → Đang giao → Hoàn thành.</p>
    </section>

    <section class="section table-wrap">
        <table class="table">
            <thead>
                <tr>
                    <th>Sản phẩm</th>
                    <th>Số lượng</th>
                    <th>Giá</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="d : ${order.orderDetails}">
                    <td th:text="${d.product.productName}">Tên sản phẩm</td>
                    <td th:text="${d.quantity}">1</td>
                    <td th:text="${#numbers.formatDecimal(d.product.price,0,'COMMA',0,'POINT')} + ' đ'">0 đ</td>
                </tr>
            </tbody>
        </table>
    </section>

    <div class="form-actions section">
        <a class="btn secondary" th:href="@{/order/history}">Quay lại lịch sử đơn hàng</a>
    </div>
</main>
</html>
