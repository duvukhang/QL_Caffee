# ===================================================================
# 1. CẤU HÌNH DATABASE - ĐÃ KẾT NỐI THÀNH CÔNG (Start completed)
# ===================================================================
spring.datasource.url=jdbc:sqlserver://127.0.0.1:1433;databaseName=StoreManageMent;encrypt=true;trustServerCertificate=true;
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Giữ đóng băng cấu hình bảng chuẩn gốc từ bên .NET sang
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# ===================================================================
# 2. CẤU HÌNH BẢO MẬT JWT
# ===================================================================
jwt.secret=${JWT_secret:Chuoi_Bi_Mat_Sieu_Bao_Mat_Cua_Khang_HUIT_2026_Nhe_Ban_Oi}
jwt.issuer=${Jwt_Issuer:StoreManageMentBackend}
jwt.audience=${Jwt_Audience:StoreManageMentFrontend}
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl