<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Nhân Viên - CRUD</title>
    <style>
        :root { --primary: #1e3a8a; --sidebar: #0f172a; --bg: #f8fafc; --surface: #ffffff; --border: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 260px; background: var(--sidebar); height: 100vh; position: fixed; color: white; padding: 20px 0; box-sizing: border-box; }
        .sidebar .brand { padding: 0 25px 20px 25px; border-bottom: 1px solid #1e293b; font-size: 18px; font-weight: bold; color: #38bdf8; }
        .sidebar-menu { list-style: none; padding: 0; margin: 0; }
        .sidebar-menu li a { display: block; padding: 12px 25px; color: #94a3b8; text-decoration: none; font-size: 14px; }
        .sidebar-menu li.active a { background: #1e293b; color: white; border-left: 4px solid #38bdf8; }
        .main-content { margin-left: 260px; flex: 1; padding: 30px; box-sizing: border-box; }
        
        /* WORKSPACE LAYOUT */
        .crud-container { display: grid; grid-template-columns: 1fr 2fr; gap: 25px; }
        .panel { background: var(--surface); padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); height: fit-content; }
        .field { display: flex; flex-direction: column; margin-bottom: 12px; }
        .field label { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #475569; }
        input, select { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
        .btn { padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; }
        .btn-save { background: #2563eb; width: 100%; margin-top: 10px; }
        .btn-edit { background: #f59e0b; padding: 4px 8px; font-size: 12px; border-radius: 4px; }
        .btn-delete { background: #ef4444; padding: 4px 8px; font-size: 12px; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { background: #f1f5f9; color: #475569; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand">🏬 HỆ THỐNG HUIT PORTAL</div>
        <ul class="sidebar-menu">
            <li><a href="../index.html">📊 Thống Kê Tổng Quan</a></li>
            <li><a href="../profile.html">👤 Hồ Sơ Cá Nhân</a></li>
            <li class="active"><a href="staff.html">👥 Quản Lý Nhân Viên</a></li>
            <li><a href="product.html">📦 Quản Lý Sản Phẩm</a></li>
            <li><a href="../manager/kho-detail.html">📦 Xem Tồn Kho Chi Nhánh</a></li>
        </ul>
    </div>

    <div class="main-content">
        <h2 style="color: var(--primary); margin-top:0; margin-bottom:25px;">👥 QUẢN TRỊ VIÊN - QUẢN LÝ TÀI KHOẢN NHÂN SỰ</h2>
        
        <div class="crud-container">
            <div class="panel">
                <h3 id="form-title" style="margin-top:0; color:#2563eb;">➕ THÊM NHÂN VIÊN MỚI</h3>
                <form id="staffForm">
                    <input type="hidden" id="txtStaffIdHidden">
                    <div class="field"><label>Họ Và Tên</label><input type="text" id="txtName" required></div>
                    <div class="field"><label>Mật Khẩu Hệ Thống</label><input type="password" id="txtPassword" placeholder="Nhập để đặt mới"></div>
                    <div class="field"><label>Quyền Hạn (Role)</label>
                        <select id="ddlRole"><option value="Manager">Manager</option><option value="Cashier">Cashier</option></select>
                    </div>
                    <div class="field"><label>Chi Nhánh (Store ID)</label><input type="text" id="txtStoreId" value="ST01"></div>
                    <button type="button" class="btn btn-save" onclick="saveStaff()">LƯU THÔNG TIN NHÂN SỰ</button>
                    <button type="button" class="btn" style="background:#64748b; width:100%; margin-top:5px; display:none;" id="btnCancelEdit" onclick="cancelEditMode()">Hủy Chế Độ Sửa</button>
                </form>
            </div>

            <div class="panel">
                <h3 style="margin-top:0; color:#475569;">📋 DANH SÁCH TÀI KHOẢN HIỆN HÀNH</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Mã NV</th>
                            <th>Họ Và Tên</th>
                            <th>Chức Vụ</th>
                            <th>Mã Kho</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody id="staff-tbody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function loadStaffs() {
            fetch('/admin/staff/all', { headers: { 'Authorization': localStorage.getItem("token") } })
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById("staff-tbody");
                tbody.innerHTML = "";
                data.forEach(s => {
                    tbody.innerHTML += `
                        <tr>
                            <td><b>${s.userId}</b></td>
                            <td>${s.fullName}</td>
                            <td><span style="color:#2563eb;font-weight:600;">${s.roleName}</span></td>
                            <td>${s.storeId || 'HUIT'}</td>
                            <td>
                                <button class="btn btn-edit" onclick="editStaff('${s.userId}', '${s.fullName}', '${s.roleName}', '${s.storeId}')">Sửa</button>
                                <button class="btn btn-delete" onclick="deleteStaff('${s.userId}')">Xóa</button>
                            </td>
                        </tr>
                    `;
                });
            }).catch(e => {
                // Đổ dữ liệu giả lập để Khang kiểm tra UI khi chưa chạy API Repo
                document.getElementById("staff-tbody").innerHTML = `
                    <tr><td><b>1001</b></td><td>Nguyễn Văn A</td><td>Manager</td><td>ST01</td><td><button class="btn btn-edit">Sửa</button> <button class="btn btn-delete">Xóa</button></td></tr>
                    <tr><td><b>1002</b></td><td>Trần Thị B</td><td>Cashier</td><td>ST01</td><td><button class="btn btn-edit">Sửa</button> <button class="btn btn-delete">Xóa</button></td></tr>
                `;
            });
        }

        function saveStaff() {
            const id = document.getElementById("txtStaffIdHidden").value;
            const bodyData = {
                fullName: document.getElementById("txtName").value,
                password: document.getElementById("txtPassword").value,
                roleName: document.getElementById("ddlRole").value,
                storeId: document.getElementById("txtStoreId").value
            };

            const url = id ? `/admin/staff/update/${id}` : '/admin/staff/create';
            const method = id ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json', 'Authorization': localStorage.getItem("token") },
                body: JSON.stringify(bodyData)
            }).then(() => { alert("Thao tác dữ liệu nhân sự thành công!"); cancelEditMode(); loadStaffs(); });
        }

        function editStaff(id, name, role, store) {
            document.getElementById("form-title").innerText = "⚙️ HIỆU CHỈNH NHÂN VIÊN";
            document.getElementById("txtStaffIdHidden").value = id;
            document.getElementById("txtName").value = name;
            document.getElementById("ddlRole").value = role;
            document.getElementById("txtStoreId").value = store;
            document.getElementById("btnCancelEdit").style.display = "block";
        }

        function cancelEditMode() {
            document.getElementById("form-title").innerText = "➕ THÊM NHÂN VIÊN MỚI";
            document.getElementById("staffForm").reset();
            document.getElementById("txtStaffIdHidden").value = "";
            document.getElementById("btnCancelEdit").style.display = "none";
        }

        function deleteStaff(id) {
            if(confirm("Xác nhận xóa vĩnh viễn tài khoản nhân sự này?")) {
                fetch(`/admin/staff/delete/${id}`, { method: 'DELETE', headers: { 'Authorization': localStorage.getItem("token") } })
                .then(() => { alert("Đã xóa!"); loadStaffs(); });
            }
        }

        document.addEventListener("DOMContentLoaded", loadStaffs);
    </script>
</body>
</html>
