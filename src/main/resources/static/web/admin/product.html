<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Sản Phẩm - Toàn Diện</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        :root { --primary: #b91c1c; --sidebar: #0f172a; --bg: #f1f5f9; --surface: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 260px; background: var(--sidebar); height: 100vh; position: fixed; color: white; padding: 20px 0; box-sizing: border-box; }
        .sidebar .brand { padding: 0 25px 20px 25px; border-bottom: 1px solid #1e293b; font-size: 18px; font-weight: bold; color: #38bdf8; }
        .sidebar-menu { list-style: none; padding: 0; margin: 0; }
        .sidebar-menu li a { display: block; padding: 12px 25px; color: #94a3b8; text-decoration: none; font-size: 14px; }
        .sidebar-menu li.active a { background: #1e293b; color: white; border-left: 4px solid #38bdf8; }
        .main-content { margin-left: 260px; flex: 1; padding: 30px; box-sizing: border-box; }
        .wrapper { display: grid; grid-template-columns: 1fr 1.3fr; gap: 20px; }
        .panel { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .field { display: flex; flex-direction: column; margin-bottom: 12px; }
        .field label { font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #475569; }
        input, textarea, select { padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; }
        .btn-action { background: var(--primary); color: white; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .prod-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand">🏬 HỆ THỐNG HUIT PORTAL</div>
        <ul class="sidebar-menu">
            <li><a href="../index.html">📊 Thống Kê Tổng Quan</a></li>
            <li><a href="staff.html">👥 Quản Lý Nhân Viên</a></li>
            <li class="active"><a href="product.html">📦 Quản Lý Sản Phẩm</a></li>
        </ul>
    </div>

    <div class="main-content">
        <h2 style="color:var(--primary); margin-top:0; margin-bottom:25px;">⚙️ QUẢN LÝ DANH MỤC HÀNG HÓA</h2>
        
        <div class="wrapper">
            <div class="panel">
                <h3 id="panel-form-title" style="margin-top: 0; color: var(--primary);">➕ THÊM MỚI SẢN PHẨM</h3>
                <form id="formProduct">
                    <input type="hidden" id="txtProdIdHidden">
                    <div class="field"><label>Tên Sản Phẩm</label><input type="text" id="txtProdName" required></div>
                    <div class="field"><label>Đơn Giá (đ)</label><input type="number" id="txtPrice" value="45000"></div>
                    <div class="field"><label>Mô Tả</label><textarea id="txtDesc" rows="3"></textarea></div>
                    
                    <div class="field">
                        <label>Loại Sản Phẩm (Danh Mục)</label>
                        <select id="txtDmId" required>
                            <option value="">-- Đang tải danh mục... --</option>
                        </select>
                    </div>

                    <div class="field" id="image-field-wrapper"><label>Hình Ảnh Minh Họa</label><input type="file" id="fileImg" accept="image/*"></div>
                    <button type="button" class="btn-action" onclick="executeSubmitProduct()">LƯU VÀO CƠ SỞ DỮ LIỆU</button>
                    <button type="button" class="btn-action" style="background:#64748b; display:none;" id="btnCancelProductEdit" onclick="resetProductForm()">Hủy Sửa</button>
                </form>
            </div>

            <div class="panel">
                <h3 style="margin-top: 0; color: #475569;">🗑️ DANH SÁCH & ĐIỀU CHỈNH HÀNG HÓA</h3>
                <div id="admin-prod-list" style="max-height: 500px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("token");

        function loadCategories() {
            fetch('/public/DanhMuc')
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById("txtDmId");
                select.innerHTML = '<option value="">-- Chọn Loại Sản Phẩm --</option>';
                data.forEach(dmCha => {
                    if(dmCha.danhMucCon && dmCha.danhMucCon.length > 0) {
                        const optgroup = document.createElement('optgroup');
                        optgroup.label = dmCha.ten;
                        dmCha.danhMucCon.forEach(dmCon => {
                            optgroup.innerHTML += `<option value="${dmCon.MaDm}">${dmCon.tenDM}</option>`;
                        });
                        select.appendChild(optgroup);
                    }
                });
            }).catch(err => console.log("Lỗi tải danh mục:", err));
        }

        function loadProducts() {
            fetch('/public/Product/1/100')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById("admin-prod-list");
                list.innerHTML = "";
                if (data && data.items) {
                    data.items.forEach(item => {
                        const p = item.Value;
                        if(p.status !== "Ngưng Kinh Doanh") {
                            const safeName = p.productName ? p.productName.replace(/'/g, "\\'") : "";
                            const safeDesc = p.description ? p.description.replace(/'/g, "\\'") : "";
                            list.innerHTML += `
                                <div class="prod-row">
                                    <div>
                                        <span style="font-weight:bold;">${p.productName}</span><br>
                                        <span style="font-size:12px; color:#64748b;">Mã: ${p.productId} | Giá: ${Number(p.price).toLocaleString('vi-VN')}đ</span>
                                    </div>
                                    <div>
                                        <button style="background:#f59e0b; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;" onclick="triggerEditMode('${p.productId}', '${safeName}', ${p.price}, '${safeDesc}', '${p.subcategoryId}')">Sửa</button>
                                        <button style="background:#ef4444; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;" onclick="softDelete('${p.productId}')">Xóa</button>
                                    </div>
                                </div>
                            `;
                        }
                    });
                }
            });
        }

        function triggerEditMode(id, name, price, desc, subCateId) {
            document.getElementById("panel-form-title").innerText = "⚙️ CẬP NHẬT SẢN PHẨM";
            document.getElementById("txtProdIdHidden").value = id; 
            document.getElementById("txtProdName").value = name;
            document.getElementById("txtPrice").value = price;
            document.getElementById("txtDesc").value = desc;
            
            // Tự động select danh mục
            if(subCateId) {
                document.getElementById("txtDmId").value = subCateId;
            }

            document.getElementById("image-field-wrapper").style.display = "none";
            document.getElementById("btnCancelProductEdit").style.display = "block";
        }

        function resetProductForm() {
            document.getElementById("panel-form-title").innerText = "➕ THÊM MỚI SẢN PHẨM";
            document.getElementById("formProduct").reset();
            document.getElementById("txtProdIdHidden").value = ""; 
            document.getElementById("image-field-wrapper").style.display = "flex";
            document.getElementById("btnCancelProductEdit").style.display = "none";
        }

        function executeSubmitProduct() {
            const id = document.getElementById("txtProdIdHidden").value;
            
            if (id) {
                // API SỬA SẢN PHẨM
                fetch(`/Admin/Product/Update/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({
                        productName: document.getElementById("txtProdName").value,
                        price: document.getElementById("txtPrice").value,
                        description: document.getElementById("txtDesc").value
                        // Lưu ý: Update API ở backend hiện đang chưa nhận subCategoryId. Sẽ cần chỉnh backend nếu muốn update cả mã loại
                    })
                }).then(() => { alert("Cập nhật thành công!"); resetProductForm(); loadProducts(); });
            } else {
                // API THÊM SẢN PHẨM
                const fileInput = document.getElementById("fileImg");
                const formData = new FormData();
                formData.append("productname", document.getElementById("txtProdName").value);
                formData.append("donGia", document.getElementById("txtPrice").value);
                formData.append("mota", document.getElementById("txtDesc").value);
                formData.append("dmid", document.getElementById("txtDmId").value);
                formData.append("file", fileInput.files[0]);

                fetch('/Admin/Product', { 
                    method: 'POST', 
                    headers: { 'Authorization': 'Bearer ' + token }, 
                    body: formData 
                }).then(async res => {
                    if(!res.ok) {
                        const err = await res.json().catch(()=>({}));
                        alert("Thất bại: " + (err.message || "Lỗi khóa ngoại Danh Mục"));
                    } else {
                        alert("Thêm sản phẩm thành công!"); 
                        resetProductForm(); loadProducts(); 
                    }
                });
            }
        }

        function softDelete(id) {
            if(confirm("Bạn có chắc chắn muốn xóa sản phẩm này?")) {
                fetch(`/Admin/Product/SoftDelete/${id}`, { 
                    method: 'PUT', headers: { 'Authorization': 'Bearer ' + token } 
                }).then(() => { alert("Đã xóa!"); loadProducts(); });
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadCategories();
            loadProducts();
        });
    </script>
</body>
</html>
