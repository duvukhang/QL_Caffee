<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quen mat khau</title>
    <style>
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f1f5f9; font-family: Arial, sans-serif; color: #0f172a; }
        form { width: calc(100% - 32px); max-width: 440px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 28px; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.1); }
        h1 { margin: 0 0 6px; color: #0f766e; font-size: 24px; }
        p { margin: 0 0 18px; color: #64748b; font-size: 13px; }
        label { display: flex; flex-direction: column; gap: 6px; font-size: 13px; font-weight: 700; color: #475569; margin-bottom: 12px; }
        input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; }
        button { width: 100%; border: 0; border-radius: 4px; background: #0f766e; color: white; padding: 12px; font-weight: 700; cursor: pointer; margin-top: 6px; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        a { display: block; margin-top: 14px; text-align: center; color: #475569; text-decoration: none; font-size: 13px; }
        .notice { display: none; padding: 10px; border-radius: 4px; font-size: 13px; margin-bottom: 14px; }
        .notice.ok { display: block; background: #ccfbf1; color: #134e4a; }
        .notice.error { display: block; background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <form id="forgot-form">
        <h1>Quen mat khau</h1>
        <p>Nhap email va so dien thoai da dang ky de dat lai mat khau.</p>
        <div id="notice" class="notice"></div>

        <label>Email
            <input id="email" type="email" maxlength="50" required>
        </label>
        <label>So dien thoai
            <input id="phone" maxlength="10" required>
        </label>
        <label>Mat khau moi
            <input id="newPassword" type="password" minlength="6" maxlength="50" required>
        </label>
        <label>Xac nhan mat khau moi
            <input id="confirmPassword" type="password" minlength="6" maxlength="50" required>
        </label>
        <button id="submit-btn" type="submit">Dat lai mat khau</button>
        <a href="login.html">Quay lai dang nhap</a>
    </form>

    <script>
        document.getElementById("forgot-form").addEventListener("submit", async (event) => {
            event.preventDefault();
            const button = document.getElementById("submit-btn");
            const payload = {
                email: value("email"),
                phone: value("phone").replace(/\D/g, ""),
                newPassword: value("newPassword"),
                confirmPassword: value("confirmPassword")
            };

            button.disabled = true;
            button.innerText = "Dang xu ly...";

            try {
                const response = await fetch("/Customer/ForgotPassword", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.message || "Khong the dat lai mat khau.");
                }
                showNotice("Da dat lai mat khau. Ban co the dang nhap lai.", false);
                setTimeout(() => window.location.href = "login.html", 1200);
            } catch (error) {
                showNotice(error.message || "Khong the dat lai mat khau.", true);
            } finally {
                button.disabled = false;
                button.innerText = "Dat lai mat khau";
            }
        });

        function value(id) {
            return document.getElementById(id).value.trim();
        }

        function showNotice(message, isError) {
            const notice = document.getElementById("notice");
            notice.className = "notice " + (isError ? "error" : "ok");
            notice.innerText = message;
        }
    </script>
</body>
</html>
