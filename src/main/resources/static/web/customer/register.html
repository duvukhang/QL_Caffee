<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang ky khach hang</title>
    <style>
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f1f5f9; font-family: Arial, sans-serif; color: #0f172a; }
        form { width: calc(100% - 32px); max-width: 520px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 28px; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.1); }
        h1 { margin: 0 0 6px; color: #0f766e; font-size: 24px; }
        p { margin: 0 0 18px; color: #64748b; font-size: 13px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        label { display: flex; flex-direction: column; gap: 6px; font-size: 13px; font-weight: 700; color: #475569; margin-bottom: 12px; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; }
        button { width: 100%; border: 0; border-radius: 4px; background: #0f766e; color: white; padding: 12px; font-weight: 700; cursor: pointer; margin-top: 6px; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        a { display: block; margin-top: 14px; text-align: center; color: #475569; text-decoration: none; font-size: 13px; }
        .notice { display: none; padding: 10px; border-radius: 4px; font-size: 13px; margin-bottom: 14px; }
        .notice.ok { display: block; background: #ccfbf1; color: #134e4a; }
        .notice.error { display: block; background: #fee2e2; color: #991b1b; }
        @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <form id="register-form">
        <h1>Dang ky khach hang</h1>
        <p>Tai khoan nay se dung chung trang dang nhap voi admin va nhan vien.</p>
        <div id="notice" class="notice"></div>

        <label>Email
            <input id="email" type="email" maxlength="50" required>
        </label>
        <label>Mat khau
            <input id="password" type="password" minlength="6" maxlength="50" required>
        </label>
        <label>Ho ten
            <input id="fullName" maxlength="50" required>
        </label>
        <div class="grid">
            <label>So dien thoai
                <input id="phone" maxlength="10" required>
            </label>
            <label>CMND/CCCD
                <input id="idNumber" maxlength="11">
            </label>
        </div>
        <label>Gioi tinh
            <select id="gender">
                <option value="">Khong chon</option>
                <option value="Nam">Nam</option>
                <option value="Nu">Nu</option>
                <option value="Khac">Khac</option>
            </select>
        </label>
        <label>Dia chi
            <input id="address" maxlength="100">
        </label>
        <button id="submit-btn" type="submit">Tao tai khoan</button>
        <a href="login.html">Da co tai khoan? Dang nhap</a>
    </form>

    <script>
        document.getElementById("register-form").addEventListener("submit", async (event) => {
            event.preventDefault();
            const button = document.getElementById("submit-btn");
            button.disabled = true;
            button.innerText = "Dang tao...";

            const payload = {
                email: value("email"),
                password: value("password"),
                fullName: value("fullName"),
                phone: value("phone").replace(/\D/g, ""),
                idNumber: value("idNumber").replace(/\D/g, ""),
                gender: value("gender"),
                address: value("address")
            };

            try {
                const response = await fetch("/Customer/Register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.message || "Khong tao duoc tai khoan.");
                }
                showNotice("Dang ky thanh cong. Ma khach hang: " + data.customerId, false);
                setTimeout(() => window.location.href = "login.html", 1200);
            } catch (error) {
                showNotice(error.message || "Khong tao duoc tai khoan.", true);
            } finally {
                button.disabled = false;
                button.innerText = "Tao tai khoan";
            }
        });

        function value(id) {
            return document.getElementById(id).value.trim();
        }

        function showNotice(message, isError) {
            const notice = document.getElementById("notice");
            notice.className = "notice " + (isError ? "error" : "ok");
            notice.innerText = message;
        }
    </script>
</body>
</html>
